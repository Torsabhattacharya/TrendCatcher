name: Fetch YouTube Trending Data

on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:  # Allows manual trigger

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install google-api-python-client pandas python-dotenv pymysql sqlite3
    
    - name: Run data fetch
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: |
        python fetch_trending.py
    
    - name: Commit and push if changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add trendcatcher.db *.csv
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: Fetch trending videos"
        git push